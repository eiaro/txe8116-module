name: Hardware CI (ERC/DRC)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  erc-drc:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/kibot:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DOCS_TOKEN }}

      - name: KiCad version
        run: |
          kicad-cli --version || true
          kibot --version || true

      - name: 'Run KiBot: ERC/DRC + fab-artefakter'
        working-directory: hardware/txe8116-module
        run: |
          kibot -b kicad/txe8116-module.kicad_pcb -e kicad/txe8116-module.kicad_sch -c .kibot.yaml --out-dir checks

      - name: 'Fail on ERC/DRC errors'
        working-directory: hardware/txe8116-module/checks
        run: |
          set -e
          # Sjekk både ERC og DRC rapporter hvis de finnes
          if ls *.rpt >/dev/null 2>&1; then
            if grep -E "ERROR|Error|VIOLATION" -R . ; then
              echo "ERC/DRC errors found"
              exit 1
            fi
          fi

      - name: Upload reports & outputs
        uses: actions/upload-artifact@v4
        with:
          name: kicad-checks-and-fab
          path: |
            hardware/txe8116-module/checks/**
            hardware/txe8116-module/fabrication/**
            hardware/txe8116-module/docs/pdf/**
          if-no-files-found: ignore

      - name: Commit generated docs and fabrication files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -r hardware/txe8116-module/checks/docs hardware/txe8116-module/
          cp -r hardware/txe8116-module/checks/fabrication hardware/txe8116-module/
          git add hardware/txe8116-module/docs/
          git add hardware/txe8116-module/fabrication/
          git diff --cached --quiet || git commit -m "chore: update generated docs and fabrication files [skip ci]"
          git push
